    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph 默认标签（SPA 首次抓取时的兜底） -->
    <meta property="og:title" content="Monolith — 代码、设计与边缘计算" />
    <meta property="og:description" content="书写代码、设计与边缘计算的个人博客。在秩序与混沌的交界处，寻找属于自己的巨石碑。" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Monolith" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:image" content="/og-default.png" />

    <!-- Twitter Card 默认标签 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Monolith — 代码、设计与边缘计算" />

  </head>
  <body class="min-h-full flex flex-col font-sans bg-background text-foreground">
    <!-- 主题初始化：在 React 加载前设置 data-theme，防止闪烁 -->
    <script>
      (function(){
        var t = localStorage.getItem('theme') || 'dark';
        var d = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.setAttribute('data-theme', d);
      })();
    </script>
    <div id="root" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
